version: '3.8'

services:
  unitconversionapi-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: unitconversionapi:dev
    container_name: unitconversionapi-dev
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - ./src:/src
      - ./src/UnitConversion.Infrastructure/Data:/app/Data
    restart: unless-stopped
